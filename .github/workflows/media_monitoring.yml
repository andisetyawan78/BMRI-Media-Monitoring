name: Bank Mandiri Media Monitoring

on:
  # Otomatis setiap hari jam 07:00 WIB = 00:00 UTC
  schedule:
    - cron: "1 9 * * *"

  # Bisa juga dijalankan manual dari tab Actions di GitHub
  workflow_dispatch:

jobs:
  monitoring:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout kode ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ───────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependensi ─────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Install font (untuk matplotlib) ───────────────────────────
      - name: Install fonts
        run: |
          sudo apt-get install -y fonts-dejavu-core
          fc-cache -f -v

      # ── 5. Jalankan monitoring ────────────────────────────────────────
      - name: Run media monitoring
        env:
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON:       ${{ secrets.GMAIL_TOKEN_JSON }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_SENDER:           ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD:     ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT:        ${{ secrets.EMAIL_RECIPIENT }}
        run: python main.py

name: Bank Mandiri Media Monitoring

on:
  # Otomatis setiap 1 jam sekali
  schedule:
    - cron: "0 * * * *"

  # Bisa juga dijalankan manual dari tab Actions di GitHub
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Izin untuk commit dashboard ke repo
permissions:
  contents: write

jobs:
  monitoring:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout kode ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ───────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependensi ─────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Install font (untuk matplotlib) ───────────────────────────
      - name: Install fonts
        run: |
          sudo apt-get install -y fonts-dejavu-core
          fc-cache -f -v

      # ── 5. Cek secrets tersedia (debug) ──────────────────────────────
      - name: Check secrets
        env:
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON:       ${{ secrets.GMAIL_TOKEN_JSON }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          secrets = {
            "GMAIL_CREDENTIALS_JSON": os.environ.get("GMAIL_CREDENTIALS_JSON",""),
            "GMAIL_TOKEN_JSON":       os.environ.get("GMAIL_TOKEN_JSON",""),
            "ANTHROPIC_API_KEY":      os.environ.get("ANTHROPIC_API_KEY",""),
          }
          for k, v in secrets.items():
            status = f"OK ({len(v)} chars)" if v else "MISSING!"
            print(f"  {k}: {status}")
          missing = [k for k,v in secrets.items() if not v]
          if missing:
            print(f"\nERROR: Secret berikut kosong: {missing}")
            exit(1)
          else:
            print("\nSemua secret tersedia.")
          EOF

      # ── 6. Jalankan monitoring ────────────────────────────────────────
      - name: Run media monitoring
        env:
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON:       ${{ secrets.GMAIL_TOKEN_JSON }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER:           ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD:     ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT:        ${{ secrets.EMAIL_RECIPIENT }}
          LISTENNOTES_API_KEY:    ${{ secrets.LISTENNOTES_API_KEY }}
          YOUTUBE_API_KEY:        ${{ secrets.YOUTUBE_API_KEY }}
          X_BEARER_TOKEN:         ${{ secrets.X_BEARER_TOKEN }}
        run: python main.py

      # ── 7. Deploy dashboard ke GitHub Pages ──────────────────────────
      - name: Deploy TV Dashboard to GitHub Pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Simpan file hasil generate ke /tmp agar tidak hilang saat pull
          cp docs/index.html /tmp/index.html
          cp docs/articles.json /tmp/articles.json
          # Reset ke remote (buang perubahan lokal)
          git fetch origin main
          git reset --hard origin/main
          # Kembalikan file hasil generate
          cp /tmp/index.html docs/index.html
          cp /tmp/articles.json docs/articles.json
          # Commit & push
          git add docs/index.html docs/articles.json
          git diff --staged --quiet || git commit -m "chore: update dashboard & data $(date +'%Y-%m-%d %H:%M')"
          git push origin HEAD:main

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="refresh" content="60">
<title>Media Monitoring Bank Mandiri</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #080d1a;
    color: #e2e8f0;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
  }
  .box { padding: 40px; }
  h1 { font-size: 2rem; color: #fff; margin-bottom: 16px; }
  p  { color: #64748b; font-size: 1rem; line-height: 1.8; }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid #1e293b;
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 24px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h1>📊 Media Monitoring Bank Mandiri</h1>
    <p>Dashboard sedang disiapkan.<br>
    Halaman ini akan otomatis diperbarui setelah workflow pertama berjalan.<br><br>
    <small style="color:#334155">Auto-refresh setiap 60 detik</small></p>
  </div>
</body>
</html>
